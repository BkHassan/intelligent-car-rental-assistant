services:
  rasa:
    build:
      context: ./rasa
      dockerfile: Dockerfile
    container_name: automaroc-rasa
    ports:
      - "5005:5005"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - RASA_TELEMETRY_ENABLED=false
    depends_on:
      action-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - chatbot-net
    restart: unless-stopped

  action-server:
    build:
      context: ./actions
      dockerfile: Dockerfile
    container_name: automaroc-actions
    ports:
      - "5055:5055"
    volumes:
      - ./actions:/app/actions
    environment:
      - RASA_TELEMETRY_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - chatbot-net
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: automaroc-frontend
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - chatbot-net
    restart: unless-stopped

networks:
  chatbot-net:
    driver: bridge